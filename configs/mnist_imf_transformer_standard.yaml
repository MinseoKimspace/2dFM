experiment:
  name: mnist_imf_transformer_standard
  mode: imf
  output_dir: runs
  seed: 42
  deterministic: true
  device: cuda

data:
  root: data
  batch_size: 48
  num_workers: 2
  pin_memory: true

model:
  arch: transformer
  encoder_variant: standard
  input_dim: 784
  model_dim: 320
  num_layers: 6
  num_heads: 8
  ff_dim: 1280
  patch_size: 2
  image_size: 28
  in_channels: 1
  time_embed_dim: 256
  dropout: 0.0
  num_streams: 4
  sinkhorn_iters: 10
  sinkhorn_tau: 0.05
  residual_identity_mix: false
  residual_alpha: 0.01

training:
  epochs: 80
  lr: 0.00005
  warmup_epochs: 5
  weight_decay: 0.0
  betas: [0.9, 0.95]
  grad_clip: 1.0
  amp: true
  log_every: 50
  sample_every: 500
  max_steps: null

sampling:
  sample_batch_size: 64
  nfe_log: [1, 2, 4, 8]
  nfe_default: 1
  nfe_choices: [1, 2, 4, 8, 16]

wandb:
  project: mnist-flow-matching
  entity: null
  enabled: true

ema:
  use: true
  decay: 0.9999
