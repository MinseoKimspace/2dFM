experiment:
  name: mnist_imf_transformer_mhc_smoke
  mode: imf
  output_dir: runs
  seed: 42
  deterministic: true
  device: cuda

data:
  root: data
  batch_size: 48
  num_workers: 2
  pin_memory: true

model:
  arch: transformer
  encoder_variant: mhc
  input_dim: 784
  model_dim: 192
  num_layers: 2
  num_heads: 6
  ff_dim: 768
  patch_size: 2
  image_size: 28
  in_channels: 1
  time_embed_dim: 128
  dropout: 0.0
  num_streams: 4
  sinkhorn_iters: 10
  sinkhorn_tau: 0.1
  residual_identity_mix: true
  residual_alpha: 0.02

training:
  epochs: 20
  lr: 0.000008
  warmup_epochs: 2
  weight_decay: 0.0
  betas: [0.9, 0.95]
  grad_clip: 0.5
  amp: true
  log_every: 10
  sample_every: 0
  max_steps: 20

sampling:
  sample_batch_size: 64
  nfe_log: [1, 2, 4]
  nfe_default: 1
  nfe_choices: [1, 2, 4, 8]

wandb:
  project: mnist-flow-matching
  entity: null
  enabled: false

ema:
  use: true
  decay: 0.99995
